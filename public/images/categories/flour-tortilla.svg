<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg-fl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E8"/>
      <stop offset="100%" style="stop-color:#EDE5D4"/>
    </linearGradient>
    <linearGradient id="tortilla-fl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F2E4C4"/>
      <stop offset="100%" style="stop-color:#DFC99A"/>
    </linearGradient>
    <linearGradient id="tortilla-fl2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDD8A8"/>
      <stop offset="100%" style="stop-color:#D4B87C"/>
    </linearGradient>
    <linearGradient id="tortilla-fl3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E5CC98"/>
      <stop offset="100%" style="stop-color:#C8A460"/>
    </linearGradient>
    <filter id="shadow-fl">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg-fl)" rx="0"/>
  <!-- Subtle texture dots -->
  <circle cx="30" cy="40" r="1.5" fill="#C8A46020"/>
  <circle cx="370" cy="220" r="2" fill="#C8A46015"/>
  <circle cx="50" cy="200" r="1" fill="#C8A46025"/>
  <circle cx="350" cy="50" r="1.5" fill="#C8A46020"/>
  <!-- Stack of flour tortillas (viewed from slight angle) -->
  <!-- Bottom tortilla (shadow) -->
  <ellipse cx="200" cy="208" rx="115" ry="18" fill="#00000018"/>
  <!-- Tortilla 5 (bottom) -->
  <ellipse cx="200" cy="200" rx="112" ry="16" fill="url(#tortilla-fl3)" filter="url(#shadow-fl)"/>
  <ellipse cx="200" cy="196" rx="112" ry="8" fill="#C8A46050"/>
  <!-- Tortilla 4 -->
  <ellipse cx="200" cy="180" rx="112" ry="16" fill="url(#tortilla-fl2)" filter="url(#shadow-fl)"/>
  <ellipse cx="200" cy="176" rx="112" ry="8" fill="#D4B87C40"/>
  <!-- Tortilla 3 -->
  <ellipse cx="200" cy="160" rx="112" ry="16" fill="url(#tortilla-fl)" filter="url(#shadow-fl)"/>
  <ellipse cx="200" cy="156" rx="112" ry="8" fill="#DFC99A40"/>
  <!-- Tortilla 2 -->
  <ellipse cx="200" cy="140" rx="112" ry="16" fill="url(#tortilla-fl2)" filter="url(#shadow-fl)"/>
  <ellipse cx="200" cy="136" rx="112" ry="8" fill="#D4B87C40"/>
  <!-- Top tortilla -->
  <ellipse cx="200" cy="118" rx="112" ry="16" fill="url(#tortilla-fl)"/>
  <!-- Top face of top tortilla -->
  <ellipse cx="200" cy="112" rx="110" ry="14" fill="#F5E8C8"/>
  <!-- Subtle char marks on top -->
  <ellipse cx="160" cy="108" rx="15" ry="4" fill="#C8A46030" transform="rotate(-20 160 108)"/>
  <ellipse cx="230" cy="115" rx="12" ry="3" fill="#C8A46025" transform="rotate(15 230 115)"/>
  <ellipse cx="195" cy="106" rx="8" ry="2.5" fill="#C8A46035" transform="rotate(-5 195 106)"/>
  <!-- Rim highlight on top tortilla -->
  <ellipse cx="200" cy="112" rx="110" ry="14" fill="none" stroke="#E8D49010" stroke-width="2"/>
  <!-- Label area -->
  <rect x="60" y="38" width="280" height="52" rx="6" fill="#ffffff60"/>
  <text x="200" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#5C3D1A" text-anchor="middle">FLOUR TORTILLAS</text>
  <text x="200" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B6040" text-anchor="middle">Wholesale · Export Grade · Private Label</text>
</svg>
